<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Twistr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">

    <!-- ── Left branding panel ── -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-logo">✦</div>
        <h1 class="brand-title">Twistr</h1>
        <p class="brand-sub">あなたの言葉を、世界へ。<br>シンプルに、リアルタイムに。</p>
        <div class="brand-features">
          <div class="brand-feature">
            <div class="brand-feature-icon">⚡</div>
            <span>リアルタイムで繋がる</span>
          </div>
          <div class="brand-feature">
            <div class="brand-feature-icon">✏️</div>
            <span>思いを 280 文字で</span>
          </div>
          <div class="brand-feature">
            <div class="brand-feature-icon">❤️</div>
            <span>みんなの声を聴く</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Right form panel ── -->
    <div class="auth-panel">
      <div class="auth-card">
        <h2 class="auth-card-title" id="form-title">おかえりなさい</h2>
        <p class="auth-card-sub" id="form-sub">アカウントにログインしてください</p>

        <div class="tab-row">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
          <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
        </div>

        <!-- Login -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">ログイン</button>
        </form>

        <!-- Signup -->
        <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>ユーザー名</label>
            <input type="text" id="signup-username" placeholder="your_name" required
                   pattern="[a-zA-Z0-9_]+" title="英数字とアンダースコアのみ" autocomplete="username">
          </div>
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label>パスワード（6文字以上）</label>
            <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password" required minlength="6">
          </div>
          <button type="submit" class="btn-primary" id="signup-btn">アカウントを作成</button>
        </form>

        <p class="status-msg" id="status-msg"></p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    (async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (user) window.location.href = 'index.html';
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').style.display  = isLogin ? '' : 'none';
      document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      document.getElementById('form-title').textContent = isLogin ? 'おかえりなさい' : 'はじめまして';
      document.getElementById('form-sub').textContent   = isLogin
        ? 'アカウントにログインしてください'
        : '無料でアカウントを作成しよう';
      document.getElementById('status-msg').textContent = '';
      document.getElementById('status-msg').style.color = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn    = document.getElementById('login-btn');
      const status = document.getElementById('status-msg');
      btn.disabled = true;
      btn.textContent = 'ログイン中…';
      status.textContent = '';

      const { error } = await sb.auth.signInWithPassword({
        email:    document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });

      if (error) {
        status.style.color = '#ef4444';
        status.textContent = 'ログインに失敗しました: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'ログイン';
      } else {
        window.location.href = 'index.html';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn    = document.getElementById('signup-btn');
      const status = document.getElementById('status-msg');
      btn.disabled = true;
      btn.textContent = '登録中…';
      status.textContent = '';

      const username = document.getElementById('signup-username').value.trim();
      const { error } = await sb.auth.signUp({
        email:    document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        options:  { data: { username, display_name: username } },
      });

      if (error) {
        status.style.color = '#ef4444';
        status.textContent = '登録に失敗しました: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'アカウントを作成';
      } else {
        status.style.color = '#10b981';
        status.textContent = '✓ 登録完了！確認メールをご確認ください。';
        btn.textContent = '登録完了 ✓';
      }
    }
  </script>
</body>
</html>
