<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Twistr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🐦</div>
      <h1 class="auth-title">Twistr</h1>

      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
      </div>

      <!-- Login form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">ログイン</button>
      </form>

      <!-- Signup form -->
      <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>ユーザー名</label>
          <input type="text" id="signup-username" placeholder="username" required pattern="[a-zA-Z0-9_]+" title="英数字とアンダースコアのみ">
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="signup-password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">アカウントを作成</button>
      </form>

      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    (async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (user) window.location.href = 'index.html';
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').style.display = isLogin ? '' : 'none';
      document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
      document.getElementById('error-msg').textContent = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'ログイン中...';
      errEl.textContent = '';

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = 'ログインに失敗しました: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'ログイン';
      } else {
        window.location.href = 'index.html';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = '登録中...';
      errEl.textContent = '';

      const username = document.getElementById('signup-username').value.trim();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { username, display_name: username } },
      });

      if (error) {
        errEl.textContent = '登録に失敗しました: ' + error.message;
        btn.disabled = false;
        btn.textContent = 'アカウントを作成';
      } else {
        errEl.style.color = '#17bf63';
        errEl.textContent = '登録完了！メールを確認してください。';
        btn.textContent = '登録完了';
      }
    }
  </script>
</body>
</html>
