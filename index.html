<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twistr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <header class="app-header">
      <div class="header-logo">🐦 Twistr</div>
      <div class="header-right">
        <span class="user-name" id="user-display"></span>
        <button class="logout-btn" id="logout-btn">ログアウト</button>
      </div>
    </header>

    <section class="composer">
      <div class="composer-inner">
        <div class="composer-avatar" id="composer-avatar">?</div>
        <div class="composer-right">
          <textarea
            id="tweet-input"
            placeholder="いまどうしてる？"
            rows="3"
          ></textarea>
          <div class="composer-footer">
            <span class="char-counter" id="char-counter">280</span>
            <button class="tweet-submit-btn" id="tweet-btn" disabled>ツイート</button>
          </div>
        </div>
      </div>
    </section>

    <main id="tweet-feed">
      <p class="empty-msg">読み込み中...</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
